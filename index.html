<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С днём рождения, тётя Ирина!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #f7c0e0 0%, #d687d6 70%, #a04b9e 100%);
      font-family: 'Segoe UI', 'Roboto', cursive, sans-serif;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Цветочный фон (летающие цветы) */
    .flowers-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      font-size: 3rem;
      opacity: 0.25;
      animation: floatFlower 12s infinite alternate ease-in-out;
      transform-origin: center;
      color: #ffecbb;
      text-shadow: 0 0 15px rgba(255, 200, 255, 0.6);
    }

    .flower:nth-child(1) { left: 5%; top: 10%; animation-duration: 14s; font-size: 4.5rem; }
    .flower:nth-child(2) { right: 8%; top: 15%; animation-duration: 11s; font-size: 3.8rem; animation-delay: -2s; }
    .flower:nth-child(3) { left: 15%; bottom: 20%; animation-duration: 16s; font-size: 5rem; animation-delay: -4s; }
    .flower:nth-child(4) { right: 5%; bottom: 10%; animation-duration: 13s; font-size: 4.2rem; animation-delay: -1s; }
    .flower:nth-child(5) { left: 45%; top: 5%; animation-duration: 15s; font-size: 3.5rem; animation-delay: -3s; }
    .flower:nth-child(6) { left: 70%; top: 55%; animation-duration: 17s; font-size: 4.8rem; animation-delay: -5s; }
    .flower:nth-child(7) { left: 20%; top: 45%; animation-duration: 12s; font-size: 3.2rem; animation-delay: -1s; }
    .flower:nth-child(8) { right: 20%; bottom: 30%; animation-duration: 14s; font-size: 4rem; animation-delay: -6s; }

    @keyframes floatFlower {
      0% { transform: translate(0, 0) rotate(0deg) scale(0.9); }
      100% { transform: translate(40px, -30px) rotate(25deg) scale(1.2); }
    }

    /* Карточка поздравления */
    .card {
      position: relative;
      z-index: 10;
      max-width: 780px;
      width: 100%;
      background: rgba(255, 240, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px 60px 60px 60px;
      padding: 2.8rem 2.5rem;
      box-shadow: 0 30px 50px rgba(110, 30, 110, 0.5),
                  inset 0 2px 10px rgba(255, 220, 255, 0.6);
      border: 2px solid rgba(255, 220, 255, 0.5);
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: scale(1.01);
      box-shadow: 0 40px 70px rgba(130, 20, 130, 0.6);
    }

    /* Заголовок */
    h1 {
      font-size: 3.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fce38a, #ffb7f0, #e57cdb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(255, 150, 255, 0.7);
      letter-spacing: 2px;
      margin-bottom: 0.25rem;
      font-family: 'Georgia', cursive;
    }

    .sub {
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff6d0;
      text-shadow: 0 0 20px #cf7fc7, 0 0 40px #b34faf;
      letter-spacing: 4px;
      background: rgba(150, 50, 150, 0.3);
      display: inline-block;
      padding: 0.2rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-bottom: 1.5rem;
      border: 1px solid #ffc8f0;
    }

    /* Строчки поздравления — цвети всегда и будь светлой как солнце */
    .poem {
      font-size: 2.2rem;
      line-height: 1.6;
      font-weight: 600;
      color: #fff9ea;
      text-shadow: 0 0 15px #b23fb2, 0 0 30px #a03d9e;
      margin: 2rem 0 1.8rem;
      padding: 0.5rem;
      background: rgba(180, 70, 170, 0.25);
      border-radius: 80px;
      backdrop-filter: blur(4px);
      border: 1px dashed #fbc3f0;
    }

    .poem span {
      display: inline-block;
      animation: glowPulse 3s infinite alternate;
    }

    @keyframes glowPulse {
      0% { text-shadow: 0 0 8px #ffb0f0, 0 0 20px #d77ad7; }
      100% { text-shadow: 0 0 20px #ffd9ff, 0 0 50px #ff8cf0, 0 0 80px #ba52b0; }
    }

    .poem i {
      font-style: normal;
      display: block;
      font-size: 2.5rem;
      margin: 0.5rem 0;
    }

    /* Доп. текст + имя */
    .name {
      font-size: 3.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd966, #fbb1f0, #d47ad4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0.3rem 0 0.8rem;
      letter-spacing: 8px;
      text-shadow: 0 0 30px #ffa5f0;
    }

    .footer-note {
      font-size: 1.5rem;
      color: #ffeaf5;
      background: rgba(200, 80, 190, 0.25);
      backdrop-filter: blur(4px);
      padding: 0.6rem 1.5rem;
      border-radius: 50px;
      display: inline-block;
      border: 1px solid #ffc0f0;
      margin-top: 0.5rem;
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* Цветочные эмодзи в тексте */
    .flowers-inline {
      font-size: 2.8rem;
      letter-spacing: 8px;
      filter: drop-shadow(0 0 8px #ffb0f0);
    }

    /* Адаптив */
    @media (max-width: 600px) {
      .card { padding: 1.8rem 1.2rem; }
      h1 { font-size: 2.8rem; }
      .sub { font-size: 1.3rem; padding: 0.2rem 1rem; }
      .poem { font-size: 1.7rem; }
      .poem i { font-size: 2rem; }
      .name { font-size: 2.5rem; }
      .footer-note { font-size: 1.2rem; }
      .flower { font-size: 2.5rem; }
    }

    /* Стиль для аудио-плеера (кастомный) */
    .audio-wrapper {
      margin-top: 25px;
      display: flex;
      justify-content: center;
    }

    audio {
      width: 240px;
      height: 40px;
      border-radius: 60px;
      background: rgba(255, 220, 255, 0.3);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 30px rgba(200, 100, 200, 0.6);
      border: 1px solid #fbc3f0;
    }

    audio::-webkit-media-controls-panel {
      background: rgba(200, 80, 200, 0.3);
      border-radius: 60px;
    }

    audio::-webkit-media-controls-play-button {
      background: #f7b0f0;
      border-radius: 50%;
      filter: drop-shadow(0 0 8px #b34faf);
    }

    /* Декоративная рамка */
    .glow-border {
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 70px;
      background: linear-gradient(45deg, #ff93e0, #b45fdb, #f07cd0, #b74bb2);
      background-size: 300% 300%;
      z-index: -1;
      animation: borderGlow 6s ease infinite;
      opacity: 0.7;
      filter: blur(6px);
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card-inner {
      position: relative;
      z-index: 2;
    }

    /* Небольшие дополнительные цветочки в тексте */
    .flower-text {
      font-size: 2rem;
      opacity: 0.9;
    }

  </style>
</head>
<body>
  <!-- Летающие цветы на фоне -->
  <div class="flowers-bg">
    <div class="flower">🌸</div>
    <div class="flower">🌺</div>
    <div class="flower">🌷</div>
    <div class="flower">🌹</div>
    <div class="flower">🌸</div>
    <div class="flower">🌺</div>
    <div class="flower">🌷</div>
    <div class="flower">🌹</div>
    <div class="flower" style="left:60%; top:80%; font-size:3.2rem;">🌸</div>
    <div class="flower" style="left:10%; top:75%; font-size:4rem;">🌺</div>
  </div>

  <!-- Основная карточка -->
  <div class="card">
    <div class="glow-border"></div>
    <div class="card-inner">
      <!-- Заголовок -->
      <h1>🎉 С днём рождения! 🎉</h1>
      <div class="sub">тётя Ирина</div>

      <!-- Цветочная строка -->
      <div class="flowers-inline">🌸 🌺 🌷 🌹 🌸</div>

      <!-- Главные строчки поздравления: "цвети всегда и будь светлой как солнце" -->
      <div class="poem">
        <span>🌸 Цвети всегда, как вешний сад,</span>
        <i>✨ и будь светлой, как солнце! ✨</i>
        <span style="font-size:1.8rem; display:block; margin-top:10px;">
          🌞 Пусть каждый день сияет ярко, 
        </span>
        <span style="font-size:1.8rem; display:block;">
          💖 а счастье льётся через край! 💖
        </span>
      </div>

      <!-- Имя + сердечки -->
      <div class="name">💜 Ириночка 💜</div>

      <!-- Дополнительные пожелания -->
      <div class="footer-note">
        🌷 С любовью и теплом 🌷
      </div>

      <!-- Музыкальный плеер (ссылка из GitHub) -->
      <div class="audio-wrapper">
        <audio controls autoplay loop>
          <source src="https://github.com/POLOLRED/Irina/blob/main/YA_dyshu-Irina_Allegrova_-_Den_Rozhdeniya_-_S_Dnjom_Rozhdeniya_Uspekha_radosti_vezeniya_lyubykh_zhelanijj_ispolneniya_i_million_nochejj_i_dnejj_S_Dnjom_Rozhdeniya_Lyubvi_do_golovokruzheniya_i_74820012%20(1).mp3?raw=true" type="audio/mpeg">
          Ваш браузер не поддерживает аудио.
        </audio>
      </div>
      <p style="color: #fadef5; font-size: 0.9rem; margin-top: 10px; opacity: 0.8; letter-spacing: 2px;">
        🎵 Ирина Аллегрова — «День Рождения» 🎵
      </p>

      <!-- Ещё цветочки -->
      <div style="margin-top: 10px; font-size: 2.2rem; letter-spacing: 10px; opacity: 0.7;">
        🌸🌺🌷🌹🌸
      </div>
    </div>
  </div>

  <!-- Дополнительный скрипт, чтобы музыка точно стартовала после загрузки (на всякий случай) -->
  <script>
    window.addEventListener('load', function() {
      const audio = document.querySelector('audio');
      if (audio) {
        // Пытаемся запустить автоматически (плюс у тега autoplay уже есть)
        audio.play().catch(e => {
          // Если автоплей заблокирован, можно показать сообщение, но это не критично
          console.log('Автозапуск музыки возможен только после взаимодействия с страницей.');
        });
      }
    });
  </script>
</body>
</html>
